<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carregando...</title>

  <!-- Fonte Ubuntu Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --green: #00ff41;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--green);
      font-family: "Ubuntu Mono", monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .center {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .msg {
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      user-select: none;
    }
    @media (max-width:420px) {
      .msg { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="center" role="status" aria-live="polite">
    <div class="msg">carregando...</div>
  </div>

  <script>
    // Tempo em milissegundos antes do redirecionamento
    const REDIRECT_MS = 1800;
    setTimeout(() => {
      window.location.href = 'msg.html';
    }, REDIRECT_MS);
  </script>
</body>
</html>
