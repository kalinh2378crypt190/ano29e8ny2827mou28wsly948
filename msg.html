<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terminal</title>
  <style>
    :root { --bg:#000; --green:#00ff41; --muted:#0a0; --warn:#ffcc00; }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--green);font-family:"Courier New",monospace}
    .terminal{width:100%;height:100%;padding:20px;box-sizing:border-box;overflow:auto}
    .line{white-space:pre-wrap;font-size:15px;line-height:1.45}
    .muted{color:rgba(0,255,65,0.45);font-size:13px}
    .warn{color:var(--warn)}
    .debug{color:#9f9; font-size:12px; opacity:.9}
  </style>
</head>
<body>
  <div class="terminal" id="terminal" aria-live="polite">
    <div class="line muted">[SYSTEM] Iniciando ambiente seguro...</div>
    <div class="line" id="typed"></div>
    <div class="line muted" id="status"></div>
    <div class="line muted" id="ipline"></div>
    <div class="line muted" id="agentline"></div>
    <div class="line muted" id="timeline"></div>
    <div class="line" id="finalmsg"></div>
  </div>

  <script>
    const script = [
      "[BOOT] kernel 5.12.0 loaded",
      "[INIT] módulos de rede: OK",
      "[SCAN] varredura de portas: iniciada",
      "[SCAN] varredura de portas: concluída",
      "[INFO] coletando metadados do host",
      "[INFO] analisando tráfego (IP)",
      "[RESULT] verificação finalizada"
    ];

    const typedEl = document.getElementById('typed');
    const statusEl = document.getElementById('status');
    const ipLineEl = document.getElementById('ipline');
    const agentLineEl = document.getElementById('agentline');
    const timeLineEl = document.getElementById('timeline');
    const finalMsgEl = document.getElementById('finalmsg');
    const terminal = document.getElementById('terminal');

    function typeTo(el, text, baseSpeed=22) {
      return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
          el.textContent += text.charAt(i);
          i++;
          if (i >= text.length) {
            clearInterval(interval);
            el.textContent += "\n";
            setTimeout(resolve, 200);
          }
        }, baseSpeed + Math.random()*30);
      });
    }

    // fetch com timeout helper
    function fetchWithTimeout(url, ms = 3500) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal, mode: 'cors' })
        .finally(() => clearTimeout(id));
    }

    // tenta endpoints sequencialmente e retorna o primeiro ip válido
    async function getPublicIP() {
      const endpoints = [
        { url: 'https://api.ipify.org?format=json', parser: d => d.ip },
        { url: 'https://ifconfig.co/json', parser: d => d.ip },
        { url: 'https://ipapi.co/json/', parser: d => d.ip },
        { url: 'https://ipinfo.io/json', parser: d => d.ip } // pode exigir token em alguns casos
      ];

      const attempts = [];
      for (const ep of endpoints) {
        try {
          const res = await fetchWithTimeout(ep.url, 3500);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const ip = ep.parser(json);
          attempts.push({ source: ep.url, ok: true, ip: ip || null });
          if (ip) return { ip, source: ep.url, attempts };
          // se não veio ip, continua para o próximo
        } catch (err) {
          attempts.push({ source: ep.url, ok: false, error: String(err) });
        }
      }
      return { attempts, error: 'Nenhuma API retornou IP' };
    }

    async function fetchAndShowInfo() {
      // mostra info imediata
      agentLineEl.textContent = "[AGENT] " + navigator.userAgent;
      timeLineEl.textContent = "[HORA LOCAL] " + new Date().toLocaleString();
      ipLineEl.textContent = "[IP] obtendo...";

      const res = await getPublicIP();

      if (res && res.ip) {
        ipLineEl.textContent = "[IP] " + res.ip + "  (via " + res.source + ")";
      } else {
        ipLineEl.innerHTML = "<span class='warn'>[IP] indisponível</span>";
        const details = document.createElement('div');
        details.className = 'line debug';
        details.textContent = "Tentativas: " + JSON.stringify(res.attempts || res);
        terminal.appendChild(details);

        const tip = document.createElement('div');
        tip.className = 'line muted';
        tip.textContent = "Dica: sirva os arquivos via HTTP (ex: 'python -m http.server') e verifique o Console (F12) para erros CORS ou de rede.";
        terminal.appendChild(tip);
      }
      terminal.scrollTop = terminal.scrollHeight;
    }

    async function showSimulatedTrace() {
      const hops = ["192.168.0.1","10.14.0.1","54.239.28.85","104.244.42.1","172.217.16.142"];
      for (let i=0;i<hops.length;i++){
        await typeTo(typedEl, `[TRACE] hop ${i+1}: ${hops[i]} (${Math.floor(10+Math.random()*120)} ms)`, 18);
      }
    }

    async function runOnce() {
      for (let i=0;i<script.length;i++){
        statusEl.textContent = "[STATUS] " + (i+1) + "/" + script.length;
        await typeTo(typedEl, script[i]);
      }
      statusEl.textContent = "[STATUS] concluído";
      await fetchAndShowInfo();
      await showSimulatedTrace();
      finalMsgEl.innerHTML = "<span style='color:#ffcc00'>[AVISO]</span> Upado em www.doxbin.com.";
      terminal.scrollTop = terminal.scrollHeight;
    }

    // roda apenas uma vez ao carregar
    window.addEventListener('load', () => {
      if (!window.__terminalHasRun) {
        window.__terminalHasRun = true;
        runOnce();
      }
    });
  </script>
</body>
</html>
